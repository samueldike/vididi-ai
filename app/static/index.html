<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Church Sermon Clipper</title>
  <style>
    :root { --bg: #f8fafc; --card: #ffffff; --ink: #172554; --ink-soft: #475569; --primary: #0f766e; --border: #dbeafe; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(160deg, #f0fdfa, #eff6ff 55%, #fff7ed); color: var(--ink); min-height: 100vh; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06); margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: 1.7rem; }
    p { margin: 0 0 10px; color: var(--ink-soft); }
    label { display: block; margin: 10px 0 6px; font-weight: 600; }
    input[type="file"], input[type="number"], input[type="text"] { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; font-size: 1rem; background: #fff; }
    button { margin-top: 14px; border: 0; border-radius: 10px; padding: 11px 16px; font-size: 1rem; color: white; background: var(--primary); cursor: pointer; }
    button:disabled { opacity: 0.65; cursor: not-allowed; }
    .status { font-weight: 600; margin-top: 10px; }
    .error { color: #b91c1c; white-space: pre-wrap; }
    .clips { display: grid; gap: 12px; }
    .clip { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; background: #f8fafc; }
    .clip h3 { margin: 0 0 8px; }
    video { width: 100%; border-radius: 8px; margin-top: 8px; }
    .meta { color: #334155; margin: 4px 0; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Church Sermon Clipper</h1>
      <p>Upload one long sermon or paste a YouTube link to get short, shareable clips.</p>
      <form id="uploadForm">
        <label for="file">Sermon File (MP4/MP3/WAV)</label>
        <input id="file" name="file" type="file" accept="audio/*,video/*" />
        <label for="youtube_url">OR YouTube Video URL</label>
        <input id="youtube_url" name="youtube_url" type="text" placeholder="https://www.youtube.com/watch?v=..." />
        <label for="clips">How many short clips?</label>
        <input id="clips" name="clips" type="number" min="1" max="10" value="5" />
        <label for="max_seconds">Max duration per clip (seconds)</label>
        <input id="max_seconds" name="max_seconds" type="number" min="10" max="120" value="30" />
        <button id="submitBtn" type="submit">Generate Short Clips</button>
      </form>
      <p id="status" class="status"></p>
      <p id="error" class="error"></p>
    </section>
    <section class="card">
      <h2>Results</h2>
      <div id="results" class="clips"></div>
    </section>
  </main>
  <script>
    const form = document.getElementById('uploadForm');
    const fileInput = document.getElementById('file');
    const youtubeInput = document.getElementById('youtube_url');
    const clipsInput = document.getElementById('clips');
    const maxSecondsInput = document.getElementById('max_seconds');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const resultsEl = document.getElementById('results');
    const submitBtn = document.getElementById('submitBtn');
    function resetUi() { errorEl.textContent = ''; resultsEl.innerHTML = ''; }
    function formatTime(sec) { const s = Math.floor(sec % 60).toString().padStart(2, '0'); const m = Math.floor((sec / 60) % 60).toString().padStart(2, '0'); const h = Math.floor(sec / 3600); return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`; }
    function renderResults(data) {
      if (!data.clips || data.clips.length === 0) { resultsEl.innerHTML = '<p>No clips were generated. Try another sermon file.</p>'; return; }
      if (data.metrics) {
        const m = document.createElement('article');
        m.className = 'clip';
        m.innerHTML = `<h3>Processing Metrics</h3>
          <p class="meta"><strong>Total:</strong> ${data.metrics.elapsed_seconds}s</p>
          <p class="meta"><strong>Stages:</strong> input ${data.metrics.stage_seconds.input}s, stt ${data.metrics.stage_seconds.stt}s, llm ${data.metrics.stage_seconds.llm}s, render ${data.metrics.stage_seconds.render}s</p>
          <p class="meta"><strong>Accuracy Proxy:</strong> speech ratio ${data.metrics.accuracy_proxy.speech_ratio}, speech ${data.metrics.accuracy_proxy.speech_duration}s / transcript ${data.metrics.accuracy_proxy.transcript_duration}s</p>
          <p class="meta"><a href="${data.log_url}" target="_blank" rel="noopener">View Detailed Job Log</a></p>`;
        resultsEl.appendChild(m);
      }
      for (const clip of data.clips) {
        const div = document.createElement('article');
        div.className = 'clip';
        const link = `<a href="${clip.url}" target="_blank" rel="noopener">Download Clip</a>`;
        div.innerHTML = `<h3>${clip.title}</h3><p class="meta"><strong>Hook:</strong> ${clip.hook}</p><p class="meta"><strong>Why this works:</strong> ${clip.reason}</p><p class="meta"><strong>Time:</strong> ${formatTime(clip.start)} - ${formatTime(clip.end)} (${Math.round(clip.end - clip.start)}s)</p><p class="meta">${link}</p><video controls src="${clip.url}"></video>`;
        resultsEl.appendChild(div);
      }
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetUi();
      const file = fileInput.files[0];
      const youtubeUrl = youtubeInput.value.trim();
      const clips = Number(clipsInput.value || 5);
      const maxSeconds = Number(maxSecondsInput.value || 30);
      if (!file && !youtubeUrl) { errorEl.textContent = 'Please upload a file or paste a YouTube URL.'; return; }
      submitBtn.disabled = true;
      statusEl.textContent = 'Processing sermon. This may take a few minutes...';
      try {
        const body = new FormData();
        if (file) body.append('file', file);
        if (youtubeUrl) body.append('youtube_url', youtubeUrl);
        const response = await fetch(`/process?clips=${encodeURIComponent(clips)}&max_seconds=${encodeURIComponent(maxSeconds)}`, { method: 'POST', body });
        const raw = await response.text();
        let payload;
        try { payload = JSON.parse(raw); } catch { payload = { detail: raw.slice(0, 400) }; }
        if (!response.ok) throw new Error(payload.detail || 'Upload failed');
        statusEl.textContent = `Done. Created ${payload.clips.length} clip(s). Job ID: ${payload.job_id}`;
        renderResults(payload);
      } catch (err) {
        statusEl.textContent = '';
        errorEl.textContent = `Error: ${err.message}`;
      } finally { submitBtn.disabled = false; }
    });
  </script>
</body>
</html>
